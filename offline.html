<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <title>Bolakaz Offline</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8fafc;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #475569;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Manrope, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(15, 118, 110, 0.16), transparent 32rem),
        linear-gradient(180deg, #fcfdff 0%, var(--bg) 100%);
    }

    main {
      width: min(100%, 28rem);
      padding: 32px 28px;
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 11rem;
      padding: 0.9rem 1.1rem;
      border-radius: 999px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>You are offline</h1>
    <p>Bolakaz could not reach the network. Reconnect and reload, or return to the storefront when service is back.</p>
    <a href="./index">Back to Store</a>
  </main>
</body>
</html>
